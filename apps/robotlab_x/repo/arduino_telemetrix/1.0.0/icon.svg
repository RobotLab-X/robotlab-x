<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="24" height="24">
  <title>arduino_telemetrix</title>
  <!-- Lucide-style board + an addressable LED strip (the chain of dots
       along the bottom) to distinguish it from the plain pymata4
       arduino icon. Plain SVG so the repo-served icon endpoint can
       stream it directly without any build step. -->
  <rect x="4" y="3" width="16" height="13" rx="2"/>
  <rect x="9" y="7" width="6" height="5"/>
  <line x1="9" y1="1" x2="9" y2="3"/>
  <line x1="15" y1="1" x2="15" y2="3"/>
  <line x1="2" y1="8" x2="4" y2="8"/>
  <line x1="2" y1="12" x2="4" y2="12"/>
  <line x1="20" y1="8" x2="22" y2="8"/>
  <line x1="20" y1="12" x2="22" y2="12"/>
  <circle cx="5" cy="21" r="1.2"/>
  <circle cx="9.5" cy="21" r="1.2"/>
  <circle cx="14" cy="21" r="1.2"/>
  <circle cx="18.5" cy="21" r="1.2"/>
</svg>
