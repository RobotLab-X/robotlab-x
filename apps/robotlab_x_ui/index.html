<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>RobotLab-X</title>
    <!-- Modular service UIs (Option B): bare specifiers in a dynamically
         imported service bundle resolve to the host's singletons via these
         shims (which re-export from window.__RLX__, set in main.tsx). Only
         affects remote bundles — the host's own Vite-bundled code never
         uses bare 'react' at runtime. See docs/TODO_SERVICE_UI_BUNDLES.md. -->
    <script type="importmap">
      {
        "imports": {
          "react": "/rlx/react.js",
          "react-dom": "/rlx/react-dom.js",
          "react/jsx-runtime": "/rlx/jsx-runtime.js",
          "@rlx/ui": "/rlx/rlx-ui.js"
        }
      }
    </script>
  </head>
  <body class="h-full bg-slate-950 text-slate-100">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
